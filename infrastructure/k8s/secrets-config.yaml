# ── Secrets (base64 encoded — create with: kubectl apply -f secrets.yaml) ──
# To generate base64: echo -n "your_value" | base64
#
# Replace the values below with your actual base64-encoded secrets before applying!
#
# Example:
#   echo -n "mongodb+srv://ghost69:PASS@cluster0..." | base64
#   echo -n "your_jwt_secret" | base64
apiVersion: v1
kind: Secret
metadata:
  name: lankan-primire-secrets
type: Opaque
data:
  MONGODB_URI: REPLACE_WITH_BASE64_ENCODED_MONGODB_URI
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET
---
# ── ConfigMap ────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: lankan-primire-config
data:
  FRONTEND_URL: "http://your-ec2-or-loadbalancer-ip"
  PORT: "5000"
