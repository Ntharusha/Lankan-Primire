# ── Backend Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lankan-primire-server
  labels:
    app: lankan-primire-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lankan-primire-server
  template:
    metadata:
      labels:
        app: lankan-primire-server
    spec:
      containers:
        - name: server
          image: ghost69/lankan-primire-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: lankan-primire-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lankan-primire-secrets
                  key: JWT_SECRET
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: lankan-primire-config
                  key: FRONTEND_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
---
# ── Backend Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: lankan-primire-server-svc
spec:
  selector:
    app: lankan-primire-server
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
