version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env # Loads MONGODB_URI from your .env (Atlas connection string)

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000/api

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
