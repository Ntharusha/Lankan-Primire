

services:
  server:
    build:
      context: ./server
      network: host
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env # Loads MONGODB_URI from your .env (Atlas connection string)

  client:
    build:
      context: ./client
      network: host
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000/api

  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"

  prometheus:
    image: quay.io/prometheus/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
