name: Lankan Primire CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test

  frontend-test:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Check code formatting/linting
      run: npm run lint
      
    - name: Run tests
      run: npm run test -- --run

  docker-build:
    name: Build & Push Docker Images
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    # Only run this on main branch pushes, not PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ghost69/lankan-primire-server:latest
          ghost69/lankan-primire-server:${{ github.sha }}
        cache-from: type=registry,ref=ghost69/lankan-primire-server:buildcache
        cache-to: type=registry,ref=ghost69/lankan-primire-server:buildcache,mode=max

    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        tags: |
          ghost69/lankan-primire-client:latest
          ghost69/lankan-primire-client:${{ github.sha }}
        cache-from: type=registry,ref=ghost69/lankan-primire-client:buildcache
        cache-to: type=registry,ref=ghost69/lankan-primire-client:buildcache,mode=max
