name: Lankan Primire CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test

  frontend-test:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Check code formatting/linting
      run: npm run lint
      
    - name: Run tests
      run: npm run test -- --run

  docker-build:
    name: Build & Push Docker Images
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    # Only run this on main branch pushes, not PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:latest
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:buildcache,mode=max

    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:latest
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Decode SSH Key
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -dc 'A-Za-z0-9+/=' | base64 -d > id_rsa
        chmod 600 id_rsa
        
    - name: SSH into EC2 and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_IP }}
        username: ${{ secrets.EC2_USER }}
        key_path: id_rsa
        script: |
          # 1. Pull the newest images
          docker pull ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:latest
          
          # 2. Stop and remove existing containers
          docker stop server client || true
          docker rm server client || true
          
          # 3. Start the Backend
          docker run -d --name server \
            -p 5000:5000 \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e NODE_ENV=production \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:latest
          
          # 4. Start the Frontend
          docker run -d --name client \
            -p 3000:80 \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:latest
          
          # 5. Wait 10 seconds and check if backend is healthy
          sleep 10
          docker logs server
          
          # 6. Clean up old unused images
          docker image prune -af
