name: Lankan Primire CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      continue-on-error: true

  frontend-test:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Check code formatting/linting
      run: npm run lint
      continue-on-error: true
      
    - name: Run tests
      run: npm run test -- --run
      continue-on-error: true

  docker-build:
    name: Build & Push Docker Images
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:latest
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:${{ github.sha }}

    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:latest
          ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # Create app directory if not exists
          mkdir -p /home/ubuntu/app
          cd /home/ubuntu/app

          # Create the Docker Compose file dynamically
          cat <<EOF > docker-compose.yml
          services:
            server:
              image: ${{ secrets.DOCKER_USERNAME }}/lankan-primire-server:latest
              restart: unless-stopped
              networks:
                - lankan-net
              ports:
                - "5000:5000"
              environment:
                - MONGODB_URI="${{ secrets.MONGODB_URI }}"
                - JWT_SECRET="${{ secrets.JWT_SECRET }}"
                - NODE_ENV=production

            client:
              image: ${{ secrets.DOCKER_USERNAME }}/lankan-primire-client:latest
              restart: unless-stopped
              networks:
                - lankan-net
              ports:
                - "3000:80"
              depends_on:
                - server

            prometheus:
              image: prom/prometheus:v2.51.1
              restart: unless-stopped
              networks:
                - lankan-net
              ports:
                - "9090:9090"
              volumes:
                - ./prometheus.yml:/etc/prometheus/prometheus.yml

            grafana:
              image: grafana/grafana-oss:10.4.2
              restart: unless-stopped
              networks:
                - lankan-net
              ports:
                - "3001:3000"
              environment:
                - GF_SECURITY_ADMIN_PASSWORD=admin
              depends_on:
                - prometheus

          networks:
            lankan-net:
              driver: bridge
          EOF

          # Create a basic prometheus config if it doesn't exist
          if [ ! -f prometheus.yml ]; then
            cat <<EOF > prometheus.yml
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'api'
              metrics_path: '/metrics'
              static_configs:
                - targets: ['server:5000']
          EOF
          fi

          # Pull and Restart the whole stack
          docker compose pull
          docker compose up -d --remove-orphans
          
          # Clean up
          docker image prune -f